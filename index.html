<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常生活での計算アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDGothic:wght@400;700&display=swap');
  :root {
    --bg: #f5f7fa; --card: #ffffff; --primary: #3a7bd5;
    --primary-light: #e8f0fc; --primary-dark: #2a5ba5; --accent: #4a9d8f;
    --text: #2c3e50; --text-light: #6b7c93; --border: #dce3ed;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'BIZ UDPGothic', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh;
  }
  .app-header {
    background: var(--card); border-bottom: 2px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  .app-header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
  .main-layout { display: flex; gap: 0; min-height: calc(100vh - 56px); }
  .sidebar {
    width: 320px; min-width: 320px; background: var(--card);
    border-right: 1px solid var(--border); padding: 20px;
    overflow-y: auto; max-height: calc(100vh - 56px);
  }
  .sidebar h2 { font-size: 14px; color: var(--text-light); margin-bottom: 16px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .form-group select {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff;
  }
  .form-group select:focus { outline: none; border-color: var(--primary); }
  .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 20px;
    font-size: 13px; cursor: pointer; background: #fff; font-family: inherit; color: var(--text);
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--primary); }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-generate {
    width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; margin-top: 8px;
  }
  .btn-generate:hover { background: var(--primary-dark); }
  .btn-secondary {
    width: 100%; padding: 10px; background: #fff; color: var(--primary);
    border: 1.5px solid var(--primary); border-radius: 8px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px;
  }
  .btn-secondary:hover { background: var(--primary-light); }
  .btn-copy {
    width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; margin-top: 8px;
  }
  .btn-copy:hover { background: #3d8a7d; }
  .btn-copy.copied { background: #6bb3a5; }
  .sidebar-note {
    font-size: 12px; color: var(--text-light); margin-top: 16px; padding: 10px;
    background: var(--primary-light); border-radius: 8px; line-height: 1.6;
  }
  .preview-area {
    flex: 1; padding: 24px; overflow-y: auto; max-height: calc(100vh - 56px);
    background: var(--bg); display: flex; justify-content: center; align-items: flex-start;
  }
  .preview-placeholder { text-align: center; color: var(--text-light); margin-top: 120px; }
  .preview-placeholder .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .preview-placeholder p { font-size: 14px; }
  .print-sheet {
    width: 210mm; min-height: 297mm; max-height: 297mm; background: #fff;
    box-shadow: var(--shadow); padding: 14mm 17mm; position: relative; overflow: hidden;
    font-family: 'BIZ UDGothic', 'BIZ UDPGothic', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #222; font-size: 13pt; line-height: 2;
  }
  .print-sheet .name-row { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 8px; }
  .name-row .name-label { margin-right: 4px; }
  .name-row .name-line { display: inline-block; width: 140px; border-bottom: 1px solid #555; }
  .print-sheet .problem-intro { margin-bottom: 8px; }
  .print-sheet .data-table { border-collapse: collapse; margin: 6px auto 8px auto; font-size: 13pt; }
  .print-sheet .data-table th, .print-sheet .data-table td { border: 1px solid #666; padding: 3px 10px; text-align: center; }
  .print-sheet .data-table th { background: #e8e8e8; font-weight: 700; }
  .print-sheet .info-box { border: 1.5px solid #666; padding: 7px 12px; margin: 6px 0; font-size: 13pt; line-height: 1.8; }
  .print-sheet .question-block { margin: 6px 0; }
  .print-sheet .answer-box { display: inline-block; min-width: 80px; text-align: center; margin: 0 2px; }
  .print-sheet .choice-row { display: flex; gap: 14px; flex-wrap: wrap; margin: 2px 0 2px 28px; font-size: 13pt; }
  .print-sheet .choice-item { white-space: nowrap; }
  .print-sheet ruby rt { font-size: 6pt; color: #555; }
  .print-sheet [contenteditable="true"]:hover { outline: 1px dashed var(--primary); outline-offset: 2px; }
  .print-sheet [contenteditable="true"]:focus { outline: 2px solid var(--primary); outline-offset: 2px; background: #fffde8; }
  @media print {
    body { background: #fff !important; }
    .app-header, .sidebar { display: none !important; }
    .main-layout { display: block !important; }
    .preview-area { display: block !important; padding: 0 !important; max-height: none !important; overflow: visible !important; }
    .print-sheet {
      box-shadow: none !important; margin: 0 !important; padding: 12mm 15mm !important;
      width: 100% !important; min-height: auto !important; max-height: none !important;
      position: static !important; overflow: visible !important;
    }
    .print-sheet [contenteditable="true"]:hover,
    .print-sheet [contenteditable="true"]:focus { outline: none !important; background: transparent !important; }
    @page { size: A4; margin: 0; }
  }
  .loading-spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 900px) {
    .main-layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: auto; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
    .preview-area { max-height: none; padding: 16px 8px; }
    .print-sheet { width: 100%; min-height: auto; max-height: none; }
  }
</style>
</head>
<body>
<header class="app-header"><h1>日常生活での計算アプリ</h1></header>
<div class="main-layout">
  <aside class="sidebar">
    <h2>設定</h2>
    <div class="form-group">
      <label>場面</label>
      <select id="genre">
        <option value="festival">お祭りの屋台（メニュー・おつり）</option>
        <option value="bbq">BBQの買い出し（まとめ買い計算）</option>
        <option value="parcel">宅配便の料金（サイズ・届け先）</option>
        <option value="bakery">パン屋さん（セット割引・持ち帰り）</option>
        <option value="laundry">コインランドリー（コース・時間帯）</option>
        <option value="party">誕生日パーティー準備（材料と人数）</option>
        <option value="dagashi">駄菓子屋さん（おこづかいで買い物）</option>
      </select>
    </div>
    <div class="form-group">
      <label>問題数</label>
      <div class="chip-group" id="countChips">
        <button class="chip" data-val="3">3問</button>
        <button class="chip active" data-val="4">4問</button>
        <button class="chip" data-val="5">5問</button>
      </div>
    </div>
    <div class="form-group">
      <label>解答形式</label>
      <div class="chip-group" id="modeChips">
        <button class="chip active" data-val="write">記述式</button>
        <button class="chip" data-val="choice">4択式</button>
      </div>
    </div>
    <button class="btn-generate" id="btnGenerate" onclick="generateProblem()">問題を作成する</button>
    <button class="btn-secondary" id="btnPrint" onclick="window.print()" style="display:none;">印刷する</button>
    <button class="btn-copy" id="btnCopy" onclick="copyHTML()" style="display:none;">HTMLをコピーする</button>
    <div class="sidebar-note" id="editNote" style="display:none;">
      プレビュー内の文字や数字をクリックすると直接編集できます。修正後に「HTMLをコピーする」を押すと、編集内容が反映されます。
    </div>
  </aside>
  <main class="preview-area" id="previewArea">
    <div class="preview-placeholder" id="placeholder">
      <div class="icon">📝</div>
      <p>左のパネルで場面を選んで<br>「問題を作成する」を押してね</p>
    </div>
  </main>
</div>
<script>
document.querySelectorAll('.chip-group').forEach(g=>{
  g.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{
      g.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
    });
  });
});
function getChip(id){const e=document.querySelector(`#${id} .chip.active`);return e?e.dataset.val:null;}

let MODE='write';
function rb(k,r){return `<ruby>${k}<rt>${r}</rt></ruby>`;}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickN(a,n){return shuffle(a).slice(0,n);}
function pickDiff(a,ex){return pick(a.filter(x=>x.name!==ex.name));}
function rp(min,max){return ri(Math.ceil(min/10),Math.floor(max/10))*10;}
function Y(){return rb('円','えん');}
/* answer box: no underline, just a space for writing */
function BL(){return `<span class="answer-box" style="border-bottom:1px solid #555;min-width:90px;display:inline-block;padding:0 4px;">　　　　　</span>`;}

function makeChoices(correct,unit){
  unit=unit||'';
  let opts=new Set();
  opts.add(correct);
  const tries=[10,20,30,50,100,-10,-20,-30,-50,-100];
  for(const t of shuffle(tries)){
    if(opts.size>=4) break;
    const v=correct+t;
    if(v>0) opts.add(v);
  }
  while(opts.size<4) opts.add(correct+ri(1,20)*10);
  let arr=shuffle([...opts]);
  const labels=['ア','イ','ウ','エ'];
  return `<div class="choice-row">${arr.map((v,i)=>`<span class="choice-item">${labels[i]}　${v}${unit}</span>`).join('')}</div>`;
}
function makeChoicesText(correct,wrongs){
  let arr=shuffle([correct,...wrongs.slice(0,3)]);
  while(arr.length<4) arr.push('どれでもない');
  arr=arr.slice(0,4);
  const labels=['ア','イ','ウ','エ'];
  return `<div class="choice-row">${arr.map((v,i)=>`<span class="choice-item">${labels[i]}　${v}</span>`).join('')}</div>`;
}

/* ============ FESTIVAL ============ */
function genFestival(count){
  const stalls=[
    {cat:'たべもの',items:[
      {name:'たこ焼き（8'+rb('個','こ')+'）'},{name:'焼きとうもろこし'},{name:'フランクフルト'},
      {name:'焼きそば'},{name:'わたがし'},{name:'チョコバナナ'},
      {name:'かき氷'},{name:rb('唐揚','からあ')+'げ（5'+rb('個','こ')+'）'},{name:'じゃがバター'},
    ]},
    {cat:'のみもの',items:[
      {name:'ラムネ'},{name:'りんごジュース'},{name:rb('麦茶','むぎちゃ')+'ペットボトル'},
      {name:'コーラ'},{name:'カルピス'},{name:'スポーツドリンク'},
    ]}
  ];
  const foods=pickN(stalls[0].items,4).map(f=>({...f,price:rp(150,600)}));
  const drinks=pickN(stalls[1].items,3).map(d=>({...d,price:rp(100,300)}));
  const festName=pick([rb('夏祭','なつまつ')+'り',rb('秋祭','あきまつ')+'り',rb('盆踊','ぼんおど')+'り'+rb('大会','たいかい'),rb('花火大会','はなびたいかい')]);

  let tbl=`<table class="data-table">
    <tr><th colspan="2">たべもの</th><th colspan="2">のみもの</th></tr>`;
  const rows=Math.max(foods.length,drinks.length);
  for(let i=0;i<rows;i++){
    const f=foods[i]||{name:'',price:''};
    const d=drinks[i]||{name:'',price:''};
    tbl+=`<tr><td contenteditable="true">${f.name}</td><td contenteditable="true">${f.price?f.price+Y():''}</td>
    <td contenteditable="true">${d.name}</td><td contenteditable="true">${d.price?d.price+Y():''}</td></tr>`;
  }
  tbl+=`</table><div style="text-align:right;font-size:11pt;color:#555;">（${rb('税込','ぜいこ')}み${rb('価格','かかく')}です。）</div>`;

  const names=shuffle(['ひなたさん','そうまさん','ゆいさん','れんさん','あおいさん']);
  const n1=names[0],n2=names[1];
  const intro=`<div class="problem-intro" contenteditable="true">
    ${n1}と${n2}は、${rb('地域','ちいき')}の「${festName}」に${rb('来','き')}ました。${rb('屋台','やたい')}の${rb('値段表','ねだんひょう')}を${rb('見','み')}て、${rb('問','と')}いに${rb('答','こた')}えよう。
  </div>`;

  const f1=pick(foods),f2=pickDiff(foods,f1),d1=pick(drinks),d2=pickDiff(drinks,d1);
  const q=[],ans=[];

  // (1) 合計
  q.push(`（１）${f1.name}と${d1.name}を${rb('買','か')}うと、${rb('合計','ごうけい')}はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:f1.price+d1.price,unit:Y()});

  // (2) おつり
  const payT=f2.price+d2.price;const payA=Math.ceil(payT/500)*500;
  q.push(`（２）${f2.name}と${d2.name}を${rb('買','か')}って${payA}${Y()}を${rb('出','だ')}しました。お${rb('釣','つ')}りはいくらですか。　${BL()} ${Y()}`);
  ans.push({val:payA-payT,unit:Y()});

  // (3) いくつ買える
  const budget3=rp(800,1500);const maxBuy=Math.floor(budget3/f1.price);
  q.push(`（３）${n1}は${budget3}${Y()}${rb('持','も')}っています。${f1.name}をなるべくたくさん${rb('買','か')}いたいとき、いくつ${rb('買','か')}えますか。　${BL()} つ`);
  ans.push({val:maxBuy,unit:'つ'});

  // (4) どちらが何円高い
  const diff4=Math.abs(f1.price-f2.price);const higher4=f1.price>=f2.price?f1.name:f2.name;
  q.push(`（４）${f1.name}と${f2.name}では、どちらが${rb('何','なん')}${Y()}${rb('高','たか')}いですか。　${BL()} の${rb('方','ほう')}が ${BL()} ${Y()}${rb('高','たか')}い`);
  ans.push(null);

  // (5) 予算内の組み合わせ
  const budget5=rp(500,1000);
  q.push(`（５）${n2}は${budget5}${Y()}${rb('持','も')}っています。たべもの１つとのみもの１つを${rb('買','か')}えるのは、${rb('何','なに')}と${rb('何','なに')}ですか。${rb('組','く')}み${rb('合','あ')}わせを${rb('一','ひと')}つ${rb('書','か')}こう。　たべもの： ${BL()} 　のみもの： ${BL()}`);
  ans.push(null);

  return buildResult(intro,tbl,q,ans,count);
}

/* ============ BBQ ============ */
function genBBQ(count){
  const members=ri(4,8);
  const store=pick(['マルシェ','フレッシュ','グリーン','デイリー'])+pick(['マート','ストア','ショップ']);
  const allItems=shuffle([
    {name:rb('牛','ぎゅう')+rb('肉','にく')+'（100gあたり）',unit:'100g',qty:members*ri(8,12)*10,per:100},
    {name:rb('豚','ぶた')+'バラ'+rb('肉','にく')+'（100gあたり）',unit:'100g',qty:members*ri(5,8)*10,per:100},
    {name:rb('鶏','とり')+rb('肉','にく')+'（100gあたり）',unit:'100g',qty:members*ri(5,10)*10,per:100},
    {name:'ウインナー（１パック'+ri(6,10)+rb('本入','ほんい')+'り）',unit:'パック',qty:ri(1,3)},
    {name:'キャベツ',unit:rb('個','こ'),qty:ri(1,2)},
    {name:'たまねぎ',unit:rb('個','こ'),qty:ri(2,5)},
    {name:'ピーマン',unit:rb('袋','ふくろ'),qty:ri(1,2)},
    {name:'とうもろこし',unit:rb('本','ほん'),qty:ri(2,6)},
    {name:'やきそば'+rb('麺','めん'),unit:rb('袋','ふくろ'),qty:ri(2,4)},
    {name:'バーベキューソース',unit:rb('本','ほん'),qty:1},
    {name:'おにぎり（１パック３'+rb('個入','こい')+'り）',unit:'パック',qty:ri(2,4)},
    {name:rb('紙','かみ')+'コップ（10'+rb('個入','こい')+'り）',unit:'パック',qty:ri(1,2)},
    {name:rb('紙皿','かみざら')+'（10'+rb('枚入','まいい')+'り）',unit:'パック',qty:ri(1,2)},
    {name:'お'+rb('茶','ちゃ')+'ペットボトル（2L）',unit:rb('本','ほん'),qty:ri(2,4)},
  ]);
  const items=allItems.slice(0,ri(6,8)).map(it=>({...it,price:rp(60,500)}));
  const subtotalRaw=items.reduce((s,it)=>{
    if(it.per) return s+(it.qty/it.per)*it.price;
    return s+it.qty*it.price;
  },0);
  const subtotal=Math.round(subtotalRaw);
  const tax=Math.round(subtotal*0.10);
  const total=subtotal+tax;
  const paid=Math.ceil(total/1000)*1000;

  let tbl=`<div class="info-box" contenteditable="true">
    <div style="font-weight:700;text-align:center;">${store}　お${rb('買','か')}い${rb('物','もの')}リスト</div>
    <table style="width:100%;font-size:13pt;margin-top:4px;border-collapse:collapse;">
      <tr style="border-bottom:1px solid #999;"><th style="text-align:left;">${rb('商品','しょうひん')}</th><th>${rb('数量','すうりょう')}</th><th style="text-align:right;">${rb('単価','たんか')}（${rb('税抜','ぜいぬ')}き）</th><th style="text-align:right;">${rb('小計','しょうけい')}</th></tr>`;
  items.forEach(it=>{
    let lineTotal,qtyStr;
    if(it.per){lineTotal=(it.qty/it.per)*it.price;qtyStr=it.qty+'g';}
    else{lineTotal=it.qty*it.price;qtyStr=it.qty+it.unit;}
    tbl+=`<tr><td style="text-align:left;">${it.name}</td><td style="text-align:center;">${qtyStr}</td><td style="text-align:right;">${it.price}${Y()}</td><td style="text-align:right;">${lineTotal}${Y()}</td></tr>`;
  });
  tbl+=`</table>
    <div style="border-top:1px dashed #888;margin-top:4px;padding-top:4px;font-size:13pt;text-align:right;">
      ${rb('税抜','ぜいぬ')}き${rb('合計','ごうけい')}：${subtotal}${Y()}<br>
      ${rb('消費税','しょうひぜい')}（10%）：${tax}${Y()}<br>
      <strong>${rb('税込','ぜいこ')}み${rb('合計','ごうけい')}：（☆）</strong><br>
      お${rb('支払','しはら')}い：${paid}${Y()}
    </div>
  </div>`;

  const names=shuffle(['かずきさん','みおさん','たけるさん','はなさん','りくさん']);
  const intro=`<div class="problem-intro" contenteditable="true">
    ${names[0]}たち${members}${rb('人','にん')}でBBQをすることになり、${rb('買','か')}い${rb('出','だ')}しに${rb('行','い')}きました。${rb('次','つぎ')}のお${rb('買','か')}い${rb('物','もの')}リストを${rb('見','み')}て、${rb('問','と')}いに${rb('答','こた')}えよう。
  </div>`;

  const q=[],ans=[];
  q.push(`（１）${rb('税込','ぜいこ')}み${rb('合計','ごうけい')}（☆）はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:total,unit:Y()});

  q.push(`（２）${paid}${Y()}を${rb('出','だ')}したとき、お${rb('釣','つ')}りはいくらですか。　${BL()} ${Y()}`);
  ans.push({val:paid-total,unit:Y()});

  const perPerson=Math.round(total/members);
  q.push(`（３）${members}${rb('人','にん')}で${rb('同','おな')}じ${rb('金額','きんがく')}ずつ${rb('割','わ')}り${rb('勘','かん')}にすると、１${rb('人','り')}あたりおよそ${rb('何','なん')}${Y()}ですか（１${Y()}${rb('未満','みまん')}は${rb('四捨五入','ししゃごにゅう')}）。　${BL()} ${Y()}`);
  ans.push({val:perPerson,unit:Y()});

  const it1=items[0],it2=items[1];
  let lt1,lt2;
  if(it1.per) lt1=(it1.qty/it1.per)*it1.price; else lt1=it1.qty*it1.price;
  if(it2.per) lt2=(it2.qty/it2.per)*it2.price; else lt2=it2.qty*it2.price;
  q.push(`（４）${it1.name}と${it2.name}の${rb('税抜','ぜいぬ')}き${rb('小計','しょうけい')}の${rb('差','さ')}はいくらですか。　${BL()} ${Y()}`);

/* ============ PARCEL ============ */
function genParcel(count){

  for(let s=0;s<4;s++){

      <tr><th>サイズ</th>`;
  regions.forEach(r=>{tbl+=`<th>${r}</th>`;});
  tbl+=`</tr>`;
  for(let s=0;s<4;s++){
    tbl+=`<tr><td>${sizes[s]}</td>`;
    grid[s].forEach(p=>{tbl+=`<td contenteditable="true">${p}${Y()}</td>`;});
    tbl+=`</tr>`;
  }
  tbl+=`</table></div>`;

  const names=shuffle(['はるかさん','こうきさん','さやかさん','だいちさん']);
  const intro=`<div class="problem-intro" contenteditable="true">
    ${names[0]}は、${rb('家族','かぞく')}への${rb('荷物','にもつ')}を${rb('送','おく')}ることにしました。${rb('次','つぎ')}の${rb('料金表','りょうきんひょう')}を${rb('見','み')}て、${rb('問','と')}いに${rb('答','こた')}えよう。
  </div>`;

  const w=ri(10,30),h=ri(10,25),d=ri(15,45);
  const totalCm=w+h+d;
  const sIdx=totalCm<=60?0:totalCm<=80?1:totalCm<=100?2:3;
  const rIdx1=ri(0,5),rIdx2=ri(0,5);
  let rIdx3=ri(0,5);while(rIdx3===rIdx2) rIdx3=ri(0,5);

  const q=[],ans=[];
  q.push(`（１）たて${w}cm、よこ${d}cm、${rb('高','たか')}さ${h}cmの${rb('荷物','にもつ')}のサイズはどれですか。　${BL()}`);
  ans.push({val:null,text:sLabels[sIdx]});

  q.push(`（２）Lサイズの${rb('荷物','にもつ')}を${regions[rIdx1]}に${rb('送','おく')}るときの${rb('料金','りょうきん')}はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:grid[2][rIdx1],unit:Y()});

  const payP=Math.ceil(grid[sIdx][rIdx2]/1000)*1000;
  q.push(`（３）${sLabels[sIdx]}サイズの${rb('荷物','にもつ')}を${regions[rIdx2]}に${rb('送','おく')}るとき、${payP}${Y()}を${rb('出','だ')}すとお${rb('釣','つ')}りはいくらですか。　${BL()} ${Y()}`);
  ans.push({val:payP-grid[sIdx][rIdx2],unit:Y()});

  q.push(`（４）Mサイズの${rb('荷物','にもつ')}を${regions[rIdx2]}に${rb('送','おく')}るときと${regions[rIdx3]}に${rb('送','おく')}るとき、${rb('料金','りょうきん')}の${rb('差','さ')}はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:Math.abs(grid[1][rIdx2]-grid[1][rIdx3]),unit:Y()});

  const sA=ri(0,1),sB=ri(2,3),rC=ri(0,5);
  q.push(`（５）${sLabels[sA]}サイズと${sLabels[sB]}サイズの${rb('荷物','にもつ')}を${rb('両方','りょうほう')}${regions[rC]}に${rb('送','おく')}ると、${rb('合計','ごうけい')}はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:grid[sA][rC]+grid[sB][rC],unit:Y()});

  return buildResult(intro,tbl,q,ans,count);
}

  const n1=names[0],n2=names[1];
  const budget1=pick([200,300,500]);
  const budget2=pick([200,300,500]);
  const intro=`<div class="problem-intro" contenteditable="true">
    ${n1}と${n2}は、${rb('駄菓子','だがし')}${rb('屋','や')}さん「${shopName}」に${rb('来','き')}ました。${n1}は${budget1}${Y()}、${n2}は${budget2}${Y()}のおこづかいを${rb('持','も')}っています。${rb('値段表','ねだんひょう')}を${rb('見','み')}て、${rb('問','と')}いに${rb('答','こた')}えよう。
  </div>`;

  const it1=items[0],it2=items[1],it3=items[2],it4=items[3];
  const q=[],ans=[];

  // (1) 合計
  q.push(`（１）${it1.name}と${it2.name}と${it3.name}を${rb('買','か')}うと、${rb('合計','ごうけい')}はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:it1.price+it2.price+it3.price,unit:Y()});

  // (2) おつり
  const n1total=it1.price+it2.price;
  const payC=Math.ceil(n1total/100)*100;const payUsed=payC>n1total?payC:payC+100;
  q.push(`（２）${n1}が${it1.name}と${it2.name}を${rb('買','か')}って${payUsed}${Y()}を${rb('出','だ')}しました。お${rb('釣','つ')}りはいくらですか。　${BL()} ${Y()}`);
  ans.push({val:payUsed-n1total,unit:Y()});

  // (3) なるべくたくさん
  const maxBuy3=Math.floor(budget2/it3.price);
  q.push(`（３）${n2}は${budget2}${Y()}${rb('持','も')}っています。${it3.name}をなるべくたくさん${rb('買','か')}いたいとき、いくつ${rb('買','か')}えますか。　${BL()} ${rb('個','こ')}`);
  ans.push({val:maxBuy3,unit:rb('個','こ')});

  // (4) 何円で何が買える
  const cheapItems=sorted.filter(x=>x.price<=budget1);
  q.push(`（４）${n1}は${budget1}${Y()}で${rb('買','か')}えるものを${rb('全部','ぜんぶ')}${rb('知','し')}りたいです。${rb('買','か')}える${rb('商品','しょうひん')}を${rb('全','すべ')}て${rb('書','か')}こう。　${BL()}`);
  ans.push(null);

  // (5) 一番高い−一番安い
  q.push(`（５）${rb('値段','ねだん')}が${rb('一番高','いちばんたか')}い${rb('商品','しょうひん')}と${rb('一番安','いちばんやす')}い${rb('商品','しょうひん')}の${rb('差','さ')}はいくらですか。　${BL()} ${Y()}`);
  ans.push({val:sorted[sorted.length-1].price-sorted[0].price,unit:Y()});

  return buildResult(intro,tbl,q,ans,count);
}

/* ============ BUILD RESULT ============ */
function buildResult(intro,tbl,q,ans,count){
  const sq=q.slice(0,count),sa=ans.slice(0,count);
  let qHTML='';
  for(let i=0;i<sq.length;i++){
    let txt=sq[i];
    if(MODE==='choice'&&sa[i]&&sa[i].val!==null&&sa[i].val!==undefined){
      const a=sa[i];
      const unitStr=a.unit||'';
      qHTML+=`<div class="question-block" contenteditable="true">${txt}\n${makeChoices(a.val,unitStr)}</div>`;
    } else if(MODE==='choice'&&sa[i]&&sa[i].text){
      const labels=['S','M','L','LL'];
      const wrong=labels.filter(x=>x!==sa[i].text).slice(0,3);
      qHTML+=`<div class="question-block" contenteditable="true">${txt}\n${makeChoicesText(sa[i].text,wrong)}</div>`;
    } else {
      qHTML+=`<div class="question-block" contenteditable="true">${txt}</div>`;
    }
  }
  return {intro,tableHTML:tbl,qHTML,extra:''};
}

/* ============ MAIN ============ */
function generateProblem(){
  const genre=document.getElementById('genre').value;
  const count=parseInt(getChip('countChips')||'4');
  MODE=getChip('modeChips')||'write';
  const btn=document.getElementById('btnGenerate');
  btn.innerHTML='<span class="loading-spinner"></span>作成中…';btn.disabled=true;
  setTimeout(()=>{
    let r;
    switch(genre){
      case 'festival':r=genFestival(count);break;
      case 'bbq':r=genBBQ(count);break;
      case 'parcel':r=genParcel(count);break;
      case 'bakery':r=genBakery(count);break;
      case 'laundry':r=genLaundry(count);break;
      case 'party':r=genParty(count);break;
      case 'dagashi':r=genDagashi(count);break;
      default:r=genFestival(count);
    }
    document.getElementById('previewArea').innerHTML=`<div class="print-sheet" id="printSheet">
      <div class="name-row"><span class="name-label">${rb('名前','なまえ')}：</span><span class="name-line"></span></div>
      ${r.intro}${r.tableHTML}${r.extra}${r.qHTML}
    </div>`;
    document.getElementById('btnPrint').style.display='';
    document.getElementById('btnCopy').style.display='';
    document.getElementById('editNote').style.display='';
    btn.innerHTML='問題を作成する';btn.disabled=false;
  },300);
}
